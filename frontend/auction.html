<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Auctions — Galaxy Mart</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--primary:#6c63ff;--dark:#0a0a1a;--card:#13132b;--text:#fff;--muted:#8888aa;--success:#00d4aa;--danger:#ff4757;--warning:#ffa502;--gold:#ffd700;}
body{background:var(--dark);color:var(--text);font-family:'Segoe UI',sans-serif;min-height:100vh;}
.bg{position:fixed;top:0;left:0;width:100%;height:100%;background:radial-gradient(ellipse at 20% 50%,#1a0533 0%,transparent 50%),radial-gradient(ellipse at 80% 20%,#0d1f4d 0%,transparent 50%);z-index:0;pointer-events:none;}
nav{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:16px 24px;background:rgba(255,255,255,0.03);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,0.08);}
.logo{font-size:1.4rem;font-weight:800;background:linear-gradient(135deg,#6c63ff,#ff6584,#ffd700);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-decoration:none;}
.nav-links{display:flex;gap:16px;align-items:center;}
.nav-links a{color:var(--muted);text-decoration:none;font-size:0.9rem;transition:color 0.3s;}
.nav-links a:hover{color:#fff;}
.btn{padding:8px 20px;border-radius:50px;border:none;cursor:pointer;font-weight:600;font-size:0.88rem;transition:all 0.3s;}
.btn-primary{background:linear-gradient(135deg,#6c63ff,#9c63ff);color:#fff;}
.btn-gold{background:linear-gradient(135deg,#ffd700,#ffaa00);color:#000;}
.btn-sm{padding:6px 14px;font-size:0.82rem;}
.btn-danger{background:var(--danger);color:#fff;}
.hero-auction{
position:relative;z-index:5;
text-align:center;padding:50px 20px 30px;
}
.hero-auction h1{
font-size:clamp(1.8rem,5vw,3rem);font-weight:900;margin-bottom:12px;
}
.live-badge{
display:inline-flex;align-items:center;gap:8px;
background:rgba(255,71,87,0.15);border:1px solid rgba(255,71,87,0.4);
padding:6px 16px;border-radius:20px;color:var(--danger);
font-size:0.85rem;font-weight:600;margin-bottom:20px;
}
.live-dot{width:8px;height:8px;background:var(--danger);border-radius:50%;animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(1.3)}}
.gradient-text{background:linear-gradient(135deg,#ffd700,#ff6584);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.container{position:relative;z-index:5;max-width:1200px;margin:0 auto;padding:0 20px 60px;}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;}
.section-title{font-size:1.4rem;font-weight:700;}
.auction-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:24px;}
.auction-card{
background:var(--card);border-radius:20px;overflow:hidden;
border:1px solid rgba(255,215,0,0.15);
transition:all 0.4s ease;position:relative;
}
.auction-card:hover{transform:translateY(-6px);box-shadow:0 20px 60px rgba(255,215,0,0.15);border-color:rgba(255,215,0,0.4);}
.auction-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#ffd700,#ff6584);}
.auction-img{
width:100%;height:180px;object-fit:cover;
background:linear-gradient(135deg,#1a1a3a,#2a1a3a);
display:flex;align-items:center;justify-content:center;
font-size:4rem;
}
.auction-body{padding:20px;}
.auction-title{font-size:1.1rem;font-weight:700;margin-bottom:8px;}
.auction-seller{color:var(--muted);font-size:0.82rem;margin-bottom:16px;}
.price-section{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:16px;}
.current-price{
font-size:1.6rem;font-weight:800;
background:linear-gradient(135deg,#ffd700,#ffaa00);
-webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.starting-price{color:var(--muted);font-size:0.8rem;}
.bid-count{color:var(--muted);font-size:0.82rem;}
.timer{
display:flex;align-items:center;gap:8px;
background:rgba(255,71,87,0.1);border:1px solid rgba(255,71,87,0.2);
border-radius:10px;padding:8px 12px;margin-bottom:16px;
font-size:0.88rem;
}
.timer-value{color:var(--danger);font-weight:700;font-size:1rem;}
.timer-label{color:var(--muted);font-size:0.75rem;}
.timer-unit{text-align:center;}
.bid-form{display:flex;gap:8px;}
.bid-input{
flex:1;padding:10px 14px;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,215,0,0.2);
border-radius:10px;color:#fff;font-size:0.9rem;
}
.bid-input:focus{outline:none;border-color:#ffd700;}
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);z-index:9999;align-items:center;justify-content:center;overflow-y:auto;padding:20px;}
.modal-overlay.show{display:flex;}
.modal{background:var(--card);border-radius:20px;padding:32px;width:90%;max-width:560px;margin:auto;border:1px solid rgba(255,215,0,0.2);position:relative;max-height:90vh;overflow-y:auto;}
.modal h2{font-size:1.5rem;font-weight:800;margin-bottom:20px;background:linear-gradient(135deg,#ffd700,#ff6584);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.close-modal{position:absolute;top:12px;right:16px;background:none;border:none;color:var(--muted);font-size:1.4rem;cursor:pointer;}
.form-group{margin-bottom:14px;}
.form-group label{display:block;font-size:0.83rem;color:var(--muted);margin-bottom:6px;}
.form-group input,.form-group textarea,.form-group select{width:100%;padding:10px 14px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:10px;color:#fff;font-size:0.9rem;}
.form-group input:focus,.form-group textarea:focus,.form-group select:focus{outline:none;border-color:#ffd700;}
.form-group textarea{height:80px;resize:vertical;}
.msg{padding:10px 14px;border-radius:8px;margin-bottom:14px;font-size:0.88rem;display:none;}
.msg.error{background:rgba(255,71,87,0.15);border:1px solid rgba(255,71,87,0.3);color:var(--danger);}
.msg.success{background:rgba(0,212,170,0.15);border:1px solid rgba(0,212,170,0.3);color:var(--success);}
.bids-list{max-height:200px;overflow-y:auto;margin-top:16px;}
.bid-item{display:flex;justify-content:space-between;padding:8px 12px;background:rgba(255,255,255,0.03);border-radius:8px;margin-bottom:6px;font-size:0.85rem;}
.bid-item:first-child{background:rgba(255,215,0,0.1);border:1px solid rgba(255,215,0,0.2);}
.winner-badge{color:var(--gold);font-size:0.75rem;}
.empty{text-align:center;padding:60px 20px;color:var(--muted);}
.ad-banner{
position:relative;z-index:5;
margin:0 20px 20px;
background:linear-gradient(135deg,rgba(108,99,255,0.1),rgba(255,101,132,0.1));
border:1px solid rgba(108,99,255,0.2);
border-radius:12px;padding:12px 20px;
display:flex;align-items:center;justify-content:space-between;
}
.ad-banner a{color:#6c63ff;text-decoration:none;font-size:0.88rem;}
.ad-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:1rem;}
.seller-badge{
display:inline-block;background:rgba(108,99,255,0.2);
border:1px solid rgba(108,99,255,0.3);
padding:3px 10px;border-radius:20px;
font-size:0.75rem;color:#6c63ff;margin-left:8px;
}
</style>
</head>
<body>
<div class="bg"></div>

<nav>
  <a href="/" class="logo">⚡ Galaxy Mart</a>
  <div class="nav-links">
    <a href="/">Home</a>
    <a href="/frontend/auction.html" style="color:#ffd700">🔨 Auctions</a>
    <a href="/frontend/customer.html">Shop</a>
    <span id="nav-user" style="color:var(--muted);font-size:0.85rem"></span>
    <button class="btn btn-primary btn-sm" id="nav-action" onclick="window.location.href='/'">Login</button>
  </div>
</nav>

<!-- AD BANNER -->
<div id="ad-container"></div>

<div class="hero-auction">
  <div class="live-badge"><div class="live-dot"></div> LIVE AUCTIONS</div>
  <h1>Bid. Win. <span class="gradient-text">Save Big!</span></h1>
  <p style="color:var(--muted);margin-bottom:24px">Place your bid on exclusive items. Highest bidder wins!</p>
  <button class="btn btn-gold" id="create-auction-btn" style="display:none" onclick="openCreateModal()">+ List Item for Auction</button>
</div>

<div class="container">
  <div class="section-header">
    <span class="section-title">🔥 Active Auctions</span>
    <span id="auction-count" style="color:var(--muted);font-size:0.85rem"></span>
  </div>
  <div class="auction-grid" id="auction-grid">
    <div class="empty">Loading auctions...</div>
  </div>
</div>

<!-- BID MODAL -->
<div class="modal-overlay" id="bidModal">
  <div class="modal">
    <button class="close-modal" onclick="closeModal('bidModal')">✕</button>
    <h2>🔨 Place Your Bid</h2>
    <div id="bid-auction-info" style="margin-bottom:16px;color:var(--muted);font-size:0.9rem;"></div>
    <div class="msg" id="bid-msg"></div>
    <div class="form-group">
      <label>Your Bid Amount (LKR)</label>
      <input type="number" id="bid-amount" placeholder="Enter amount">
      <p id="min-bid-hint" style="color:var(--muted);font-size:0.78rem;margin-top:4px"></p>
    </div>
    <button class="btn btn-gold" style="width:100%;padding:12px" onclick="placeBid()">Place Bid 🔨</button>
    <div class="bids-list" id="bids-list"></div>
  </div>
</div>

<!-- CREATE AUCTION MODAL -->
<div class="modal-overlay" id="createModal">
  <div class="modal">
    <button class="close-modal" onclick="closeModal('createModal')">✕</button>
    <h2>🏷️ List Item for Auction</h2>
    <div class="msg" id="create-msg"></div>
    <div class="form-group"><label>Product Name</label><input type="text" id="a-name" placeholder="What are you selling?"></div>
    <div class="form-group"><label>Description</label><textarea id="a-desc" placeholder="Describe your item..."></textarea></div>
    <div class="form-group"><label>Starting Price (LKR)</label><input type="number" id="a-price" placeholder="1000"></div>
    <div class="form-group"><label>Minimum Bid Increment (LKR)</label><input type="number" id="a-increment" placeholder="100"></div>
    <div class="form-group">
      <label>Auction End Date & Time</label>
      <input type="datetime-local" id="a-endtime">
    </div>
    <p style="color:var(--muted);font-size:0.8rem;margin-bottom:16px">
      ⚠️ Galaxy Mart commission: <strong id="commission-rate" style="color:#ffd700">15%</strong> of final sale price
    </p>
    <button class="btn btn-gold" style="width:100%;padding:12px" onclick="createAuction()">Start Auction 🚀</button>
  </div>
</div>

<script>
const API = '';
const token = localStorage.getItem('gm_token');
const user = JSON.parse(localStorage.getItem('gm_user') || 'null');
let currentAuctionId = null;
let timers = {};

// Nav setup
if(user) {
  document.getElementById('nav-user').textContent = '👤 ' + user.username;
  document.getElementById('nav-action').textContent = 'Dashboard';
  document.getElementById('nav-action').onclick = () => {
    window.location.href = user.role === 'admin' ? '/frontend/admin.html' : user.role === 'seller' ? '/frontend/seller.html' : '/frontend/customer.html';
  };
  if(user.role === 'seller' || user.role === 'admin') {
    document.getElementById('create-auction-btn').style.display = 'inline-block';
  }
}

async function loadAuctions() {
  try {
    const res = await fetch(`${API}/api/auctions`);
    const data = await res.json();
    const grid = document.getElementById('auction-grid');

    if(!data.success || !data.auctions.length) {
      grid.innerHTML = '<div class="empty">🔨 No active auctions right now.<br>Check back soon!</div>';
      return;
    }

    document.getElementById('auction-count').textContent = data.auctions.length + ' active auctions';
    grid.innerHTML = data.auctions.map(a => `
      <div class="auction-card" id="card-${a.id}">
        <div class="auction-img">🏷️</div>
        <div class="auction-body">
          <div class="auction-title">${a.product_name}</div>
          <div class="auction-seller">by @${a.seller_name} <span class="seller-badge">Seller</span></div>
          <div class="price-section">
            <div>
              <div class="current-price">LKR ${Number(a.current_price).toLocaleString()}</div>
              <div class="starting-price">Started at LKR ${Number(a.starting_price).toLocaleString()}</div>
            </div>
            <div class="bid-count">🔨 ${a.bid_count} bids</div>
          </div>
          <div class="timer" id="timer-${a.id}">
            <span>⏰</span>
            <div class="timer-unit"><div class="timer-value" id="t-h-${a.id}">--</div><div class="timer-label">Hours</div></div>
            <div style="color:var(--muted)">:</div>
            <div class="timer-unit"><div class="timer-value" id="t-m-${a.id}">--</div><div class="timer-label">Mins</div></div>
            <div style="color:var(--muted)">:</div>
            <div class="timer-unit"><div class="timer-value" id="t-s-${a.id}">--</div><div class="timer-label">Secs</div></div>
          </div>
          <div class="bid-form">
            <input class="bid-input" type="number" id="quick-bid-${a.id}" 
              placeholder="LKR ${(Number(a.current_price) + 100).toLocaleString()}+">
            <button class="btn btn-gold btn-sm" onclick="openBidModal('${a.id}','${a.product_name}',${a.current_price},${a.min_bid_increment})">
              Bid Now
            </button>
          </div>
        </div>
      </div>
    `).join('');

    data.auctions.forEach(a => startTimer(a.id, a.end_time));
  } catch(err) {
    document.getElementById('auction-grid').innerHTML = '<div class="empty">Failed to load auctions</div>';
  }
}

function startTimer(id, endTime) {
  if(timers[id]) clearInterval(timers[id]);
  timers[id] = setInterval(() => {
    const diff = new Date(endTime) - new Date();
    if(diff <= 0) {
      clearInterval(timers[id]);
      const card = document.getElementById('card-' + id);
      if(card) card.style.opacity = '0.5';
      ['t-h-','t-m-','t-s-'].forEach(p => {
        const el = document.getElementById(p + id);
        if(el) el.textContent = '00';
      });
      return;
    }
    const h = Math.floor(diff / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    const s = Math.floor((diff % 60000) / 1000);
    const fmt = n => String(n).padStart(2,'0');
    const hEl = document.getElementById('t-h-' + id);
    const mEl = document.getElementById('t-m-' + id);
    const sEl = document.getElementById('t-s-' + id);
    if(hEl) hEl.textContent = fmt(h);
    if(mEl) mEl.textContent = fmt(m);
    if(sEl) sEl.textContent = fmt(s);
  }, 1000);
}

async function openBidModal(id, name, currentPrice, minIncrement) {
  if(!user) { alert('Please login to bid!'); window.location.href = '/'; return; }
  currentAuctionId = id;
  const minBid = Number(currentPrice) + Number(minIncrement);
  document.getElementById('bid-auction-info').innerHTML = `
    <strong>${name}</strong><br>
    Current Price: <span style="color:#ffd700;font-weight:700">LKR ${Number(currentPrice).toLocaleString()}</span>
  `;
  document.getElementById('bid-amount').value = minBid;
  document.getElementById('min-bid-hint').textContent = `Minimum bid: LKR ${minBid.toLocaleString()}`;
  document.getElementById('bid-msg').style.display = 'none';

  const res = await fetch(`${API}/api/auctions/${id}`);
  const data = await res.json();
  if(data.success) {
    const bids = data.bids;
    document.getElementById('bids-list').innerHTML = bids.length ? `
      <p style="color:var(--muted);font-size:0.8rem;margin-bottom:8px">Recent Bids:</p>
      ${bids.slice(0,5).map((b,i) => `
        <div class="bid-item">
          <span>${i===0?'🥇':i===1?'🥈':i===2?'🥉':'•'} @${b.bidder_name}</span>
          <span style="color:#ffd700;font-weight:700">LKR ${Number(b.bid_amount).toLocaleString()}</span>
        </div>
      `).join('')}
    ` : '<p style="color:var(--muted);font-size:0.85rem;text-align:center;margin-top:12px">No bids yet. Be the first!</p>';
  }

  document.getElementById('bidModal').classList.add('show');
}

async function placeBid() {
  if(!token) { alert('Please login!'); return; }
  const amount = document.getElementById('bid-amount').value;
  if(!amount) return showMsg('bid-msg', 'Enter bid amount', 'error');

  try {
    const res = await fetch(`${API}/api/auctions/${currentAuctionId}/bid`, {
      method: 'POST',
      headers: {'Content-Type':'application/json','Authorization':'Bearer '+token},
      body: JSON.stringify({bid_amount: Number(amount)})
    });
    const data = await res.json();
    if(data.success) {
      showMsg('bid-msg', '🎉 Bid placed successfully!', 'success');
      setTimeout(() => { closeModal('bidModal'); loadAuctions(); }, 1500);
    } else {
      showMsg('bid-msg', data.error || 'Failed', 'error');
    }
  } catch(err) {
    showMsg('bid-msg', 'Connection error', 'error');
  }
}

function openCreateModal() {
  const now = new Date();
  now.setHours(now.getHours() + 24);
  document.getElementById('a-endtime').value = now.toISOString().slice(0,16);
  document.getElementById('create-msg').style.display = 'none';
  document.getElementById('createModal').classList.add('show');
}

async function createAuction() {
  if(!token) return;
  const data = {
    product_name: document.getElementById('a-name').value,
    description: document.getElementById('a-desc').value,
    starting_price: document.getElementById('a-price').value,
    min_bid_increment: document.getElementById('a-increment').value || 100,
    end_time: document.getElementById('a-endtime').value
  };
  if(!data.product_name || !data.starting_price || !data.end_time) {
    return showMsg('create-msg', 'Please fill all required fields', 'error');
  }

  try {
    const res = await fetch(`${API}/api/auctions`, {
      method: 'POST',
      headers: {'Content-Type':'application/json','Authorization':'Bearer '+token},
      body: JSON.stringify(data)
    });
    const result = await res.json();
    if(result.success) {
      showMsg('create-msg', '🎉 Auction created!', 'success');
      setTimeout(() => { closeModal('createModal'); loadAuctions(); }, 1500);
    } else {
      showMsg('create-msg', result.error || 'Failed', 'error');
    }
  } catch(err) {
    showMsg('create-msg', 'Connection error', 'error');
  }
}

async function loadAds() {
  try {
    const res = await fetch(`${API}/api/ads`);
    const data = await res.json();
    if(data.success && data.ads.length) {
      const ad = data.ads[0];
      document.getElementById('ad-container').innerHTML = `
        <div class="ad-banner">
          <span>📢 ${ad.title || 'Special Offer'}</span>
          <a href="${ad.link_url}" target="_blank">Visit →</a>
          <button class="ad-close" onclick="this.parentElement.parentElement.innerHTML=''">✕</button>
        </div>
      `;
    }
  } catch(err) {}
}

function showMsg(id, msg, type) {
  const el = document.getElementById(id);
  el.textContent = msg; el.className = 'msg ' + type; el.style.display = 'block';
}

function openModal(id) { document.getElementById(id).classList.add('show'); }
function closeModal(id) { document.getElementById(id).classList.remove('show'); }

document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => { if(e.target === m) closeModal(m.id); });
});

loadAuctions();
loadAds();
setInterval(loadAuctions, 30000);
</script>
</body>
</html>
