<body>
    <button onclick="doLogout()" style="background:#6c63ff; color:#fff; border:none; padding:10px; cursor:pointer;">Logout</button>

    <script>
        // ඔබගේ පවතින JS මෙතැනට දමන්න

            localStorage.clear();
            window.location.href = '/index.html';
        }
    </script>
</body>
